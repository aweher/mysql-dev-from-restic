name: Docker Compose Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker-compose config

      - name: Test Docker Compose build
        run: |
          # Create a minimal .env for testing
          cat > .env << EOF
          RESTIC_REPOSITORY=dummy://test
          RESTIC_PASSWORD=test_password
          DB_LIST=test_db
          MYSQL_ROOT_PASSWORD=test_password
          MYSQL_USER=testuser
          MYSQL_PASSWORD=test_password
          CLUSTER_NAME=test-cluster
          EOF

      - name: Build services
        run: docker-compose build

      - name: Test service startup (dry run)
        run: |
          # Test that services can be created without actually starting
          docker-compose create mysql-dev

      - name: Cleanup
        if: always()
        run: |
          docker-compose down --volumes --remove-orphans || true
          docker system prune -f || true